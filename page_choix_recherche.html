<script>
    document.querySelectorAll('.bouton-groupe').forEach((btn, index) => {
        btn.style.opacity = "0";
        btn.style.transform = "translateY(20px)";
        
        setTimeout(() => {
            btn.style.transition = "all 0.5s ease-out";
            btn.style.opacity = "1";
            btn.style.transform = "translateY(0)";
        }, 100 * index); // Décale l'apparition de chaque bouton
    });
</script>
