<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickers Lyon - Archives Groupe externe Stade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.2/simple-lightbox.min.css">
    <link rel="stylesheet" href="css/bg.css">
</head>
<body>

    <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="sidebar-sommaire" id="sidebar">
        <h4>SOMMAIRE</h4>
        <div class="sommaire-section">
            <p>SECTION</p>
            <a href="#parigone">Parigone</a>
            <a href="#gen">Gones en Nord</a>
            <a href="#lfni">Lyon Fans Nord Isere</a>
        </div>
        <a href="index.html" class="back-home">← Accueil</a>
    </nav>

    <div class="main-wrapper">
        <h1 class="group-main-title">Groupe externe Stade</h1>

        <section class="category-block">
            <h2 class="category-title">Section</h2>

            <h3 class="item-title" id="con">Parigone</h3>
            <div class="sticker-grid">
                <a href="img/autre/parigone/1.jpeg" class="lightbox"><img src="img/autre/parigone/1.jpeg"></a>
            </div>

            <h3 class="item-title" id="con">Gones en Nord</h3>
            <div class="sticker-grid">
                <a href="img/autre/gonesennord/1.jpeg" class="lightbox"><img src="img/autre/gonesennord/1.jpeg"></a>
            </div>
            
            <h3 class="item-title" id="jbg">Lyon Fans Nord Isere</h3>
            <div class="sticker-grid">
                <a href="img/autre/nord_isere/1.jpeg" class="lightbox"><img src="img/autre/nord_isere/1.jpeg"></a>
                <a href="img/autre/nord_isere/2.jpeg" class="lightbox"><img src="img/autre/nord_isere/2.jpeg"></a>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.2/simple-lightbox.min.js"></script>
    <script>
        // Initialisation Lightbox
        var lightbox = new SimpleLightbox('.sticker-grid a', { fadeSpeed: 200, showCounter: false });

        // Gestion Menu Mobile
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            menuToggle.classList.toggle('open');
        });

        // Fermer le menu quand on clique sur un lien
        document.querySelectorAll('.sidebar-sommaire a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
                menuToggle.classList.remove('open');
            });
        });
    </script>
</body>
</html>
